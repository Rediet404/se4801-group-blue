services:
  clinic-postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_secure_password_change_me
      POSTGRES_DB: clinic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  clinic-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://clinic-postgres:5432/clinic_db
      SPRING_DATASOURCE_USERNAME: clinic_user
      SPRING_DATASOURCE_PASSWORD: clinic_secure_password_change_me
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      APP_JWT_SECRET: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1jbGluaWNlbC1zdXJwYXNzLW1lLTMya2V5cwo=
      APP_JWT_EXPIRATION_MILLIS: 86400000
      APP_JWT_ISSUER: clinic
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:3003,http://192.168.137.1:3000,http://192.168.137.1:3001,http://192.168.20.27:3000,http://192.168.20.27:3001
    ports:
      - "8080:8080"
    depends_on:
      clinic-postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
