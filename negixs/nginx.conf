events {
  worker_connections 1024;
}

http {

  # ── Backend load balancer pool ──────────────────────────
 upstream backend_pool {
  least_conn;
  server backend_1:8080 max_fails=3 fail_timeout=30s;  # ← 8080 not 8000
  server backend_2:8080 max_fails=3 fail_timeout=30s;
}

  # ── Frontend load balancer pool ─────────────────────────
 upstream frontend_pool {
  least_conn;
  server frontend_1:3000 max_fails=3 fail_timeout=30s;
  server frontend_2:3000 max_fails=3 fail_timeout=30s;
}

  server {
    listen 80;

    # ── API requests → backend pool ─────────────────────
    location /api/ {
      proxy_pass         http://backend_pool;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── All other requests → frontend pool ──────────────
    location / {
      proxy_pass         http://frontend_pool;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
  }
}