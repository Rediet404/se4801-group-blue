services:
  nginx:
    image: nginx:alpine
    container_name: clinic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../negixs/nginx.conf:/etc/nginx/nginx.conf:ro # ← negixs not nginx
    depends_on:
      - frontend_1
      - frontend_2
      - backend_1
      - backend_2
    networks:
      - clinic_network

  frontend_1:
    build: ../frontend # ← ../
    container_name: clinic-frontend-1
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx/api
    expose:
      - "3000"
    networks:
      - clinic_network

  frontend_2:
    build: ../frontend # ← ../
    container_name: clinic-frontend-2
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx/api
    expose:
      - "3000"
    networks:
      - clinic_network

  backend_1:
    build:
      context: ../backend # ← ../
      dockerfile: Dockerfile
    container_name: clinic-backend-1
    restart: unless-stopped
    env_file:
      - ../backend/.env # ← ../
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinic_db
      SPRING_DATASOURCE_USERNAME: clinic_user
      SPRING_DATASOURCE_PASSWORD: clinic_secure_password_change_me
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_JWT_SECRET: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1jbGluaWNlbC1zdXJwYXNzLW1lLTMya2V5cwo=
      APP_JWT_EXPIRATION_MILLIS: 86400000
      APP_JWT_ISSUER: clinic
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost,http://nginx,http://192.168.20.27
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clinic_network

  backend_2:
    build:
      context: ../backend # ← ../
      dockerfile: Dockerfile
    container_name: clinic-backend-2
    restart: unless-stopped
    env_file:
      - ../backend/.env # ← ../
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinic_db
      SPRING_DATASOURCE_USERNAME: clinic_user
      SPRING_DATASOURCE_PASSWORD: clinic_secure_password_change_me
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_JWT_SECRET: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1jbGluaWNlbC1zdXJwYXNzLW1lLTMya2V5cwo=
      APP_JWT_EXPIRATION_MILLIS: 86400000
      APP_JWT_ISSUER: clinic
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost,http://nginx,http://192.168.20.27
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clinic_network

  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_secure_password_change_me
      POSTGRES_DB: clinic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic_network

  redis:
    image: redis:7-alpine
    container_name: clinic-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinic_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  clinic_network:
    driver: bridge
